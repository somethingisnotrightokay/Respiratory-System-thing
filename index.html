<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Respiratory Simulation v4</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #020408;
      font-family: Inter, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .ui {
      position: fixed;
      left: 20px;
      top: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px 16px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      border: none;
      background: #00d2ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="ui">
    <div id="title">Respiratory System</div>
    <div id="desc">Cinematic simulation ready</div>
    <button id="btn">Start Cinematic</button>
  </div>

  <script>
    let scene, camera, renderer, composer;
    let root, leftLung, rightLung, leftShell, rightShell, membrane;
    let tracheaMesh, carinaMesh, branchInstanced, alveoliInstanced, airflowPoints, hazeGroup;
    let branchMatrices = [], alveoliMatrices = [];
    let targetOpacity = 1.0, targetTransmission = 0.65;
    let targetBloom = 0.8;
    let running = false;
    let progress = 0;
    let clock = null;

    const titleEl = document.getElementById("title");
    const descEl = document.getElementById("desc");
    const btnEl = document.getElementById("btn");

    const upVec = new THREE.Vector3(0, 1, 0);
    const dummy = new THREE.Object3D();
    const targetZoomNode = new THREE.Vector3(0.15, -0.2, 0.8);

    const airCurves = [];
    const airParticles = [];
    const airParticleCount = 1600;

    let tissueNoise;
    let cameraPath;
    let lookPath;

    function createNoiseTexture(size = 256) {
      const cvs = document.createElement("canvas");
      cvs.width = cvs.height = size;
      const ctx = cvs.getContext("2d");
      const img = ctx.createImageData(size, size);

      for (let i = 0; i < img.data.length; i += 4) {
        const v = 118 + Math.random() * 72;
        img.data[i] = v;
        img.data[i + 1] = v - 10;
        img.data[i + 2] = v - 18;
        img.data[i + 3] = 255;
      }

      ctx.putImageData(img, 0, 0);

      const tex = new THREE.CanvasTexture(cvs);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(8, 8);
      tex.anisotropy = 4;
      return tex;
    }

    function deformLungGeometry(isLeft) {
      const geo = new THREE.SphereGeometry(1.85, 96, 96);
      const pos = geo.attributes.position;
      const v = new THREE.Vector3();

      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i);
        let { x, y, z } = v;

        const taper = Math.max(0, y);
        x *= 1 - Math.pow(taper, 1.45) * 0.34;
        z *= 1 - Math.pow(taper, 1.55) * 0.28;

        if (isLeft && x > 0) x *= 0.18;
        if (!isLeft && x < 0) x *= 0.18;

        if (y < 0) {
          const d = Math.sqrt(x * x + z * z);
          y += Math.max(0, 1 - d * 1.35) * 0.42;
          y += 0.08;
        }

        if (isLeft && x > -0.55 && y > -0.55 && y < 0.22 && z > 0) {
          x -= 0.62 * (1 - Math.abs(y)) * Math.max(0, z);
        }

        x *= 1.55;
        y *= 2.85;
        z *= 1.75;

        const n1 = Math.sin(x * 5.3) * Math.cos(y * 4.2) * Math.sin(z * 5.1) * 0.022;
        const n2 = Math.sin((x + y + z) * 2.8) * 0.012;
        const noise = n1 + n2;

        x += noise;
        y += noise;
        z += noise;

        pos.setXYZ(i, x, y, z);
      }

      geo.computeVertexNormals();
      return geo;
    }

    function makeLungGroup(isLeft) {
      const group = new THREE.Group();

      const baseMaterial = new THREE.MeshPhysicalMaterial({
        color: isLeft ? 0xd95e72 : 0xdf6675,
        roughness: 0.44,
        metalness: 0.0,
        transmission: 0.52,
        thickness: 1.7,
        clearcoat: 0.68,
        clearcoatRoughness: 0.22,
        ior: 1.38,
        emissive: 0x140004,
        emissiveIntensity: 0.28,
        normalMap: tissueNoise,
        normalScale: new THREE.Vector2(0.2, 0.2),
        bumpMap: tissueNoise,
        bumpScale: 0.03,
        roughnessMap: tissueNoise,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 1.0
      });

      const innerMaterial = new THREE.MeshPhysicalMaterial({
        color: isLeft ? 0xc94d62 : 0xcf5664,
        roughness: 0.58,
        transmission: 0.22,
        thickness: 1.0,
        clearcoat: 0.2,
        transparent: true,
        opacity: 0.62,
        emissive: 0x100003,
        emissiveIntensity: 0.12,
        side: THREE.DoubleSide
      });

      const lobeTint = new THREE.MeshPhysicalMaterial({
        color: isLeft ? 0xe17a8a : 0xe27a80,
        roughness: 0.52,
        transmission: 0.12,
        thickness: 0.6,
        transparent: true,
        opacity: 0.24,
        emissive: 0x150005,
        emissiveIntensity: 0.08,
        side: THREE.DoubleSide
      });

      const shell = new THREE.Mesh(deformLungGeometry(isLeft), baseMaterial);
      shell.castShadow = true;
      shell.receiveShadow = true;
      group.add(shell);

      const inner = new THREE.Mesh(deformLungGeometry(isLeft), innerMaterial);
      inner.scale.setScalar(0.94);
      inner.position.y = -0.02;
      group.add(inner);

      const lobeCount = isLeft ? 2 : 3;

      for (let i = 0; i < lobeCount; i++) {
        const l = new THREE.Mesh(new THREE.SphereGeometry(1.18, 48, 48), lobeTint.clone());
        l.scale.set(isLeft ? 0.95 : 1.0, i === 0 ? 0.65 : 0.76, 0.78);
        l.position.set(
          isLeft ? -0.15 : 0.10,
          isLeft ? 0.95 - i * 1.22 : 1.15 - i * 0.98,
          i === 1 ? 0.18 : -0.06
        );
        l.rotation.z = isLeft ? -0.12 : 0.1;
        group.add(l);
      }

      group.position.x = isLeft ? -2.18 : 2.18;
      group.position.y = 0.35;
      group.scale.set(1.02, 1.0, 0.98);

      return { group, shell, inner };
    }

    function addBranchMatrix(start, end, radius) {
      const length = start.distanceTo(end);
      dummy.position.copy(start).lerp(end, 0.5);
      dummy.quaternion.setFromUnitVectors(upVec, end.clone().sub(start).normalize());
      dummy.scale.set(radius, length, radius);
      dummy.updateMatrix();
      branchMatrices.push(dummy.matrix.clone());
    }

    function addAlveoliMatrix(pos, radius, spin = true) {
      dummy.position.copy(pos);
      dummy.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        spin ? Math.random() * Math.PI : 0
      );
      const s = radius * (1.45 + Math.random() * 0.85);
      dummy.scale.set(s, s, s);
      dummy.updateMatrix();
      alveoliMatrices.push(dummy.matrix.clone());
    }

    function generateTree(startPt, dir, length, radius, depth, isLeft) {
      const endPt = startPt.clone().add(dir.clone().multiplyScalar(length));
      addBranchMatrix(startPt, endPt, radius);

      if (depth >= 7) {
        for (let i = 0; i < 5; i++) {
          const offset = new THREE.Vector3(
            (Math.random() - 0.5) * radius * 4.6,
            (Math.random() - 0.5) * radius * 4.6,
            (Math.random() - 0.5) * radius * 4.6
          );
          addAlveoliMatrix(endPt.clone().add(offset), radius * 0.95);
        }

        if (endPt.y < 1.8 && endPt.z > 0.6 && Math.abs(endPt.x) < 3.2) {
          targetZoomNode.lerp(endPt, 0.55);
        }
        return;
      }

      for (let i = 0; i < 2; i++) {
        const branchAngle = 0.31 + Math.random() * 0.18;

        let axis = new THREE.Vector3(
          Math.random() - 0.5,
          Math.random() - 0.5,
          Math.random() - 0.5
        ).normalize();

        axis.x += isLeft ? -0.55 : 0.55;
        axis.normalize();

        const perp = dir.clone().cross(axis).normalize();
        const angle = i === 0 ? branchAngle : -branchAngle;

        let newDir = dir.clone().applyAxisAngle(perp, angle).normalize();
        newDir.applyAxisAngle(dir, (Math.random() - 0.5) * 0.28);

        generateTree(
          endPt,
          newDir,
          length * (0.73 + Math.random() * 0.08),
          radius * 0.76,
          depth + 1,
          isLeft
        );
      }
    }

    function addFlowCurve(points) {
      const curve = new THREE.CatmullRomCurve3(points, false, "catmullrom", 0.35);
      airCurves.push(curve);
      return curve;
    }

    function makeAirflowSystem() {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(airParticleCount * 3);
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const mat = new THREE.PointsMaterial({
        color: 0x7df4ff,
        size: 0.05,
        transparent: true,
        opacity: 0.75,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });

      airflowPoints = new THREE.Points(geo, mat);
      airflowPoints.renderOrder = 5;
      root.add(airflowPoints);

      for (let i = 0; i < airParticleCount; i++) {
        const curveIndex = Math.floor(Math.random() * airCurves.length);
        airParticles.push({
          curveIndex,
          u: Math.random(),
          speed: 0.09 + Math.random() * 0.22,
          drift: 0.008 + Math.random() * 0.018,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.7 + Math.random() * 1.5,
          colorBias: Math.random()
        });
      }
    }

    function makeHaze() {
      hazeGroup = new THREE.Group();

      const hazeMat = new THREE.MeshBasicMaterial({
        color: 0x0d2a3a,
        transparent: true,
        opacity: 0.045,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
      });

      const hazeMat2 = new THREE.MeshBasicMaterial({
        color: 0x2f6b7f,
        transparent: true,
        opacity: 0.028,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
      });

      for (let i = 0; i < 3; i++) {
        const haze = new THREE.Mesh(
          new THREE.SphereGeometry(10 + i * 3.3, 32, 32),
          i % 2 ? hazeMat : hazeMat2
        );
        haze.position.set((i - 1) * 0.8, 0.6 - i * 0.4, -1.5 + i * 0.5);
        hazeGroup.add(haze);
      }

      root.add(hazeGroup);
    }

    function buildScene() {
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020408, 0.028);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
      camera.position.set(0, 2, 18);

      composer = new THREE.EffectComposer(renderer);
      composer.addPass(new THREE.RenderPass(scene, camera));
      composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.72, 0.92, 0.28));

      scene.add(new THREE.AmbientLight(0x223344, 0.55));

      const rim = new THREE.PointLight(0x00e5ff, 2.2, 60);
      rim.position.set(-5, 2, -5);
      scene.add(rim);

      const warm = new THREE.PointLight(0xff5577, 1.85, 60);
      warm.position.set(5, -3, 5);
      scene.add(warm);

      const fill = new THREE.PointLight(0xa8f1ff, 0.75, 48);
      fill.position.set(0, 4, 10);
      scene.add(fill);

      root = new THREE.Group();
      scene.add(root);

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(13, 72),
        new THREE.ShadowMaterial({ opacity: 0.17 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -5.25;
      ground.receiveShadow = true;
      root.add(ground);

      const bgGlow = new THREE.Mesh(
        new THREE.SphereGeometry(22, 48, 48),
        new THREE.MeshBasicMaterial({
          color: 0x09121f,
          transparent: true,
          opacity: 0.16,
          side: THREE.BackSide
        })
      );
      scene.add(bgGlow);

      tissueNoise = createNoiseTexture();

      const left = makeLungGroup(true);
      const right = makeLungGroup(false);

      leftLung = left.group;
      rightLung = right.group;
      leftShell = left.shell;
      rightShell = right.shell;

      root.add(leftLung, rightLung);

      membrane = new THREE.Mesh(
        new THREE.SphereGeometry(5.35, 80, 80),
        new THREE.MeshPhysicalMaterial({
          color: 0x9f233f,
          transmission: 0.16,
          thickness: 0.9,
          roughness: 0.2,
          clearcoat: 0.92,
          clearcoatRoughness: 0.16,
          transparent: true,
          opacity: 0.12,
          side: THREE.DoubleSide,
          emissive: 0x1d0006,
          emissiveIntensity: 0.16,
          depthWrite: false
        })
      );
      membrane.position.set(0, 0.18, -0.1);
      root.add(membrane);

      const airwayMat = new THREE.MeshStandardMaterial({
        color: 0xdbeeff,
        roughness: 0.38,
        metalness: 0.0
      });

      const ringMat = new THREE.MeshStandardMaterial({
        color: 0xbfd8e8,
        roughness: 0.32,
        metalness: 0.0
      });

      tracheaMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.26, 0.32, 3.8, 14, 1, false),
        airwayMat
      );
      tracheaMesh.position.set(0, 4.55, 0);
      tracheaMesh.castShadow = true;
      tracheaMesh.receiveShadow = true;
      root.add(tracheaMesh);

      for (let i = 0; i < 9; i++) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.31, 0.055, 8, 24),
          ringMat
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.set(0, 3.35 + i * 0.35, 0.02);
        ring.castShadow = true;
        root.add(ring);
      }

      carinaMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 18, 18),
        new THREE.MeshPhysicalMaterial({
          color: 0xc7e3f2,
          roughness: 0.35,
          clearcoat: 0.5,
          transparent: true,
          opacity: 0.9
        })
      );
      carinaMesh.position.set(0, 2.85, 0.15);
      root.add(carinaMesh);

      const carina = new THREE.Vector3(0, 2.85, 0.15);

      const leftMain = new THREE.Vector3(-0.95, 2.0, 0.2);
      const rightMain = new THREE.Vector3(0.95, 1.95, -0.05);

      addBranchMatrix(carina, leftMain, 0.22);
      addBranchMatrix(carina, rightMain, 0.22);

      const leftUpper = new THREE.Vector3(-1.55, 1.25, 0.25);
      const leftLower = new THREE.Vector3(-1.35, 0.15, 0.1);

      const rightUpper = new THREE.Vector3(1.55, 1.35, -0.05);
      const rightMiddle = new THREE.Vector3(1.95, 0.55, 0.0);
      const rightLower = new THREE.Vector3(1.35, -0.2, -0.05);

      addBranchMatrix(leftMain, leftUpper, 0.16);
      addBranchMatrix(leftMain, leftLower, 0.16);
      addBranchMatrix(rightMain, rightUpper, 0.16);
      addBranchMatrix(rightMain, rightMiddle, 0.15);
      addBranchMatrix(rightMain, rightLower, 0.15);

      generateTree(leftUpper, new THREE.Vector3(-0.55, -0.82, 0.18).normalize(), 1.05, 0.14, 2, true);
      generateTree(leftLower, new THREE.Vector3(-0.28, -0.92, 0.08).normalize(), 1.15, 0.13, 2, true);

      generateTree(rightUpper, new THREE.Vector3(0.5, -0.82, -0.12).normalize(), 1.05, 0.14, 2, false);
      generateTree(rightMiddle, new THREE.Vector3(0.42, -0.88, 0.03).normalize(), 1.0, 0.13, 2, false);
      generateTree(rightLower, new THREE.Vector3(0.3, -0.94, -0.08).normalize(), 1.1, 0.12, 2, false);

      const branchGeo = new THREE.CylinderGeometry(1, 1, 1, 8, 1, false);
      branchInstanced = new THREE.InstancedMesh(
        branchGeo,
        new THREE.MeshStandardMaterial({
          color: 0xf0c6c9,
          roughness: 0.58,
          metalness: 0.0
        }),
        branchMatrices.length
      );
      branchInstanced.castShadow = true;
      branchInstanced.receiveShadow = true;
      for (let i = 0; i < branchMatrices.length; i++) {
        branchInstanced.setMatrixAt(i, branchMatrices[i]);
      }
      root.add(branchInstanced);

      const alveoliGeo = new THREE.IcosahedronGeometry(1, 2);
      alveoliInstanced = new THREE.InstancedMesh(
        alveoliGeo,
        new THREE.MeshPhysicalMaterial({
          color: 0xffedf2,
          roughness: 0.28,
          clearcoat: 0.34,
          transmission: 0.15,
          thickness: 0.85,
          emissive: 0x24000a,
          emissiveIntensity: 0.24
        }),
        alveoliMatrices.length
      );
      alveoliInstanced.castShadow = true;
      alveoliInstanced.receiveShadow = true;
      for (let i = 0; i < alveoliMatrices.length; i++) {
        alveoliInstanced.setMatrixAt(i, alveoliMatrices[i]);
      }
      root.add(alveoliInstanced);

      addFlowCurve([
        new THREE.Vector3(0, 5.1, 0),
        new THREE.Vector3(0, 4.3, 0),
        new THREE.Vector3(0, 3.5, 0.02),
        new THREE.Vector3(0, 2.85, 0.15)
      ]);

      addFlowCurve([
        new THREE.Vector3(0, 2.85, 0.15),
        new THREE.Vector3(-0.55, 2.3, 0.16),
        new THREE.Vector3(-1.0, 1.95, 0.18),
        new THREE.Vector3(-1.55, 1.25, 0.25),
        new THREE.Vector3(-1.35, 0.15, 0.1),
        new THREE.Vector3(-1.9, -0.8, 0.18)
      ]);

      addFlowCurve([
        new THREE.Vector3(0, 2.85, 0.15),
        new THREE.Vector3(0.6, 2.35, 0.08),
        new THREE.Vector3(1.0, 1.95, -0.04),
        new THREE.Vector3(1.55, 1.35, -0.05),
        new THREE.Vector3(1.95, 0.55, 0.0),
        new THREE.Vector3(1.35, -0.2, -0.05)
      ]);

      addFlowCurve([
        new THREE.Vector3(-1.35, 0.15, 0.1),
        new THREE.Vector3(-1.75, -0.55, 0.18),
        new THREE.Vector3(-2.05, -1.2, 0.12)
      ]);

      addFlowCurve([
        new THREE.Vector3(1.35, -0.2, -0.05),
        new THREE.Vector3(1.75, -0.7, 0.0),
        new THREE.Vector3(2.0, -1.2, -0.1)
      ]);

      addFlowCurve([
        new THREE.Vector3(0.25, 1.15, 2.1),
        new THREE.Vector3(0.15, 0.7, 1.55),
        new THREE.Vector3(0.0, 0.25, 1.0),
        new THREE.Vector3(-0.2, -0.15, 0.55),
        targetZoomNode.clone()
      ]);

      makeHaze();
      makeAirflowSystem();

      cameraPath = new THREE.CatmullRomCurve3(
        [
          new THREE.Vector3(0, 2.1, 18.5),
          new THREE.Vector3(4.0, 2.8, 15.0),
          new THREE.Vector3(2.8, 1.2, 11.0),
          new THREE.Vector3(0.0, 1.7, 8.5),
          new THREE.Vector3(-1.2, 1.1, 6.2),
          new THREE.Vector3(0.2, 0.2, 4.5),
          new THREE.Vector3(0.0, -0.2, 6.8),
          new THREE.Vector3(-0.3, 0.8, 10.5)
        ],
        false,
        "catmullrom",
        0.35
      );

      lookPath = new THREE.CatmullRomCurve3(
        [
          new THREE.Vector3(0, 1.8, 0),
          new THREE.Vector3(0.2, 1.7, 0),
          new THREE.Vector3(0.0, 1.1, 0.05),
          new THREE.Vector3(-0.6, 0.8, 0.1),
          new THREE.Vector3(0.1, 0.45, 0.15),
          new THREE.Vector3(-0.15, -0.2, 0.2),
          targetZoomNode.clone()
        ],
        false,
        "catmullrom",
        0.4
      );

      clock = new THREE.Clock();

      titleEl.innerText = "Respiratory System";
      descEl.innerText = "Cinematic simulation ready";
      btnEl.innerText = "Start Cinematic";
      btnEl.onclick = () => {
        running = true;
        progress = 0;
        titleEl.innerText = "Cinematic Flythrough";
        descEl.innerText = "Volumetric haze, airflow, and airway branching engaged.";
        btnEl.innerText = "Restart Cinematic";
      };

      window.addEventListener("resize", onResize);
      animate();
    }

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    }

    function updateAirflow(dt, t) {
      const arr = airflowPoints.geometry.attributes.position.array;

      for (let i = 0; i < airParticles.length; i++) {
        const p = airParticles[i];
        const curve = airCurves[p.curveIndex];

        p.u += dt * p.speed;
        if (p.u > 1) {
          p.curveIndex = Math.floor(Math.random() * airCurves.length);
          p.u = Math.random() * 0.05;
          p.speed = 0.09 + Math.random() * 0.22;
          p.drift = 0.008 + Math.random() * 0.018;
        }

        const point = curve.getPointAt(p.u);
        const tangent = curve.getTangentAt(p.u).normalize();

        const side = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0, 1, 0));
        if (side.lengthSq() < 0.0001) side.set(1, 0, 0);
        side.normalize();

        const wob = Math.sin(t * p.wobbleSpeed + p.wobble) * p.drift;
        const bob = Math.cos(t * (p.wobbleSpeed * 0.8) + p.wobble) * p.drift * 0.65;

        arr[i * 3] = point.x + side.x * wob;
        arr[i * 3 + 1] = point.y + bob;
        arr[i * 3 + 2] = point.z + side.z * wob;
      }

      airflowPoints.geometry.attributes.position.needsUpdate = true;
    }

    function updateCamera(dt, t) {
      if (running) {
        progress += dt * 0.075;
        if (progress > 1) progress = 1;

        const camBase = cameraPath.getPointAt(progress);
        const lookBase = lookPath.getPointAt(progress);

        const cinematicShake = new THREE.Vector3(
          Math.sin(t * 0.85) * 0.03,
          Math.cos(t * 1.05) * 0.02,
          Math.sin(t * 0.62) * 0.025
        );

        camera.position.lerp(camBase.clone().add(cinematicShake), 0.08);
        camera.lookAt(lookBase);
      } else {
        camera.position.x = Math.sin(t * 0.32) * 0.55;
        camera.position.y = 2 + Math.cos(t * 0.22) * 0.18;
        camera.position.z = 18 + Math.sin(t * 0.18) * 0.35;
        camera.lookAt(0, 0.7, 0);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);
      const t = clock.elapsedTime;

      const breath = Math.sin(t * 1.15);
      const breath2 = Math.sin(t * 1.15 + 0.18);

      leftLung.scale.set(
        1 + breath * 0.030,
        1 + breath * 0.018,
        1 + breath * 0.024
      );

      rightLung.scale.set(
        1 + breath2 * 0.034,
        1 + breath2 * 0.018,
        1 + breath2 * 0.026
      );

      leftLung.rotation.z = Math.sin(t * 0.18) * 0.01;
      rightLung.rotation.z = -Math.sin(t * 0.18) * 0.01;
      root.rotation.y = 0.1 + Math.sin(t * 0.14) * 0.03;
      root.rotation.x = -0.05 + Math.sin(t * 0.24) * 0.006;
      root.position.y = Math.sin(t * 1.1) * 0.03;

      leftShell.scale.setScalar(0.94 + breath * 0.010);
      rightShell.scale.setScalar(0.94 + breath2 * 0.010);
      membrane.scale.setScalar(1 + Math.sin(t * 1.15) * 0.007);

      tracheaMesh.scale.set(
        1 + Math.sin(t * 1.15) * 0.006,
        1 + Math.sin(t * 1.15) * 0.012,
        1 + Math.sin(t * 1.15) * 0.006
      );

      carinaMesh.scale.setScalar(1 + Math.max(0, Math.sin(t * 2.2)) * 0.06);

      targetOpacity = running && progress > 0.16 ? 0.22 : 1.0;
      targetTransmission = running && progress > 0.16 ? 0.82 : 0.65;
      targetBloom = running ? 0.72 : 0.8;

      leftShell.material.opacity = THREE.MathUtils.lerp(leftShell.material.opacity, targetOpacity, dt * 1.8);
      rightShell.material.opacity = THREE.MathUtils.lerp(rightShell.material.opacity, targetOpacity, dt * 1.8);
      leftShell.material.transmission = THREE.MathUtils.lerp(leftShell.material.transmission, targetTransmission, dt * 1.8);
      rightShell.material.transmission = THREE.MathUtils.lerp(rightShell.material.transmission, targetTransmission, dt * 1.8);

      leftLung.children[1].material.opacity = THREE.MathUtils.lerp(leftLung.children[1].material.opacity, targetOpacity * 0.7, dt * 1.6);
      rightLung.children[1].material.opacity = THREE.MathUtils.lerp(rightLung.children[1].material.opacity, targetOpacity * 0.7, dt * 1.6);

      scene.children.forEach((obj) => {
        if (obj.isPointLight) {
          obj.intensity = obj.color.getHex() === 0x00e5ff
            ? 2.2 + Math.max(0, Math.sin(t * 1.8)) * 0.18
            : 1.85 + Math.max(0, Math.sin(t * 1.6 + 1.2)) * 0.12;
        }
      });

      if (hazeGroup) {
        hazeGroup.rotation.y = t * 0.035;
        hazeGroup.rotation.x = Math.sin(t * 0.08) * 0.02;
        hazeGroup.children.forEach((h, i) => {
          h.scale.setScalar(1 + Math.sin(t * 0.3 + i) * 0.02);
        });
      }

      updateAirflow(dt, t);
      updateCamera(dt, t);

      if (composer && composer.passes && composer.passes[1]) {
        composer.passes[1].strength = THREE.MathUtils.lerp(
          composer.passes[1].strength,
          targetBloom,
          dt * 1.4
        );
      }

      branchInstanced.rotation.y = Math.sin(t * 0.08) * 0.01;
      alveoliInstanced.rotation.y = Math.sin(t * 0.09) * 0.014;

      composer.render();
    }

    buildScene();
  </script>
</body>
</html>
